<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Paper Assistant</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        .container {
            width: 80%;
            margin: auto;
            padding: 30px;
        }

        h1 {
            text-align: center;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            border: none;
        }

        .answer {
            margin-top: 20px;
            background: #334155;
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>📚 Research Paper Assistant</h1>

    <div class="card">
        <input type="file" id="pdfFile">
        <br>
        <button onclick="uploadPDF()">Upload PDF</button>
    </div>

    <div class="card">
        <h2>📌 Title</h2>
        <p id="title"></p>
    </div>

    <div class="card">
        <h2>🧠 Summary</h2>
        <p id="summary"></p>
    </div>

    <div class="card">
        <h2>❓ Ask Questions</h2>

        <input type="text" id="question" placeholder="Ask about the paper...">

        <button onclick="askQuestion()">Ask</button>

        <div class="answer">
            <h3>🤖 Answer</h3>
            <p id="answer"></p>
        </div>
    </div>

</div>

<script>

async function uploadPDF() {

    const fileInput = document.getElementById("pdfFile")

    const formData = new FormData()

    formData.append("file", fileInput.files[0])

    const response = await fetch("/upload", {
        method: "POST",
        body: formData
    })

    const data = await response.json()

    document.getElementById("title").innerText = data.title
    document.getElementById("summary").innerText = data.summary
}


async function askQuestion() {

    const question = document.getElementById("question").value

    const response = await fetch("/ask", {
        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({
            question: question
        })
    })

    const data = await response.json()

    document.getElementById("answer").innerText = data.answer
}

</script>

</body>
</html>
